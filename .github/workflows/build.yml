name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (bake typecheck)
        run: bun src/cli/main.ts typecheck

      - name: Format check (bake fmt)
        run: bun src/cli/main.ts fmt

      - name: Test (bake test)
        run: bun src/cli/main.ts test

      - name: Build (bake build) — branch push
        if: github.ref_type == 'branch'
        run: bun src/cli/main.ts build

      - name: Build (bake build:prod) — tag push
        if: github.ref_type == 'tag'
        run: bun src/cli/main.ts build:prod

      - name: Upload bake binary
        uses: actions/upload-artifact@v4
        with:
          name: bake-${{ matrix.os }}-${{ github.ref_name }}
          path: dist/bake
          if-no-files-found: error
          retention-days: 14
